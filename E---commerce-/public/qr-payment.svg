    <rect x="11" y="7" width="1" height="2"/>
    <rect x="11" y="10" width="1" height="1"/>
    
    <rect x="12" y="0" width="1" height="3"/>
    <rect x="12" y="4" width="1" height="1"/>
    <rect x="12" y="6" width="1" height="1"/>
