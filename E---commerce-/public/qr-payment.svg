    <rect x="204" y="1" width="5" height="5" class="qr-bg"/>
    <rect x="205" y="2" width="3" height="3"/>
    
    <!-- Bottom-left position detection pattern -->
    <rect x="0" y="203" width="7" height="7"/>
    <rect x="1" y="204" width="5" height="5" class="qr-bg"/>
    <rect x="2" y="205" width="3" height="3"/>
    
